<svg xmlns="http://www.w3.org/2000/svg" width="880" height="200" viewBox="0 0 880 200" role="img" aria-label="SBOM Security">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <style>
      .title  { font: 700 52px 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #f0f6fc; }
      .sub    { font: 400 19px 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #8b949e; }
      .chip   { font: 600 13px 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #c9d1d9; }
      .chipbg { fill: #21262d; stroke: #30363d; }
    </style>
  </defs>

  <rect width="880" height="200" rx="14" fill="url(#bg)"/>
  <rect width="6" height="200" rx="3" fill="url(#accent)"/>

  <!-- cube / package mark -->
  <g transform="translate(54,58) scale(1.0)" fill="none" stroke="url(#accent)" stroke-width="3.2"
     stroke-linejoin="round" stroke-linecap="round">
    <path d="M42 8 L78 28 L78 64 L42 84 L6 64 L6 28 Z"/>
    <path d="M42 8 L42 46 M42 46 L78 28 M42 46 L6 28"/>
    <path d="M42 46 L42 84" opacity="0.65"/>
  </g>

  <!-- wordmark -->
  <text x="150" y="86" class="title">SBOM Security</text>
  <text x="152" y="118" class="sub">CycloneDX &amp; SPDX SBOMs &#183; vulnerability correlation &#183; dependency drift</text>

  <!-- chips -->
  <g transform="translate(152,142)">
    <g><rect class="chipbg" x="0"   y="0" width="78"  height="28" rx="14"/><text class="chip" x="39"  y="19" text-anchor="middle">Python</text></g>
    <g><rect class="chipbg" x="90"  y="0" width="66"  height="28" rx="14"/><text class="chip" x="123" y="19" text-anchor="middle">Node</text></g>
    <g><rect class="chipbg" x="166" y="0" width="76"  height="28" rx="14"/><text class="chip" x="204" y="19" text-anchor="middle">Maven</text></g>
    <g><rect class="chipbg" x="252" y="0" width="54"  height="28" rx="14"/><text class="chip" x="279" y="19" text-anchor="middle">Go</text></g>
    <g><rect class="chipbg" x="330" y="0" width="92"  height="28" rx="14"/><text class="chip" x="376" y="19" text-anchor="middle">CycloneDX</text></g>
    <g><rect class="chipbg" x="432" y="0" width="62"  height="28" rx="14"/><text class="chip" x="463" y="19" text-anchor="middle">SPDX</text></g>
  </g>

  <text x="826" y="184" text-anchor="end" class="chip" fill="#6e7681">KIZEN</text>
</svg>
